<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Classic Interface // Pro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
    :root {
      --bg-dark: #1a1a20;
      --glass-bg: rgba(255, 255, 255, 0.05);
    }
    body { margin: 0; min-height: 100vh; font-family: 'Outfit', sans-serif; color: #fff; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    
    /* Анимация контура */
    .bento-container {
      position: relative;
      background: rgba(30, 30, 40, 0.95);
      border-radius: 32px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border: 3px solid transparent;
      background-clip: padding-box;
    }
    .bento-container::before {
      content: '';
      position: absolute;
      top: -3px; left: -3px; right: -3px; bottom: -3px;
      border-radius: 35px;
      background: linear-gradient(45deg, #ff00cc, #3333ff, #00ffcc, #ff00cc);
      background-size: 400%;
      z-index: -1;
      animation: border-rotate 8s linear infinite;
    }
    @keyframes border-rotate { 0% { background-position: 0 0; } 100% { background-position: 400% 0; } }

    .results-panel { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
    .settings-btn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #d1d1d6; padding: 12px; border-radius: 12px; cursor: pointer; }
    .settings-btn.active { background: rgba(255,255,255,0.1); border-color: #fff; color: #fff; }
    .settings-panel { display: none; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
    .modern-input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px; border-radius: 8px; width: 100px; text-align: center; }
    .cloud-btn { width: 100%; background: #6366f1; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: 600; }
    .counters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .counter-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 16px; display: flex; flex-direction: column; align-items: center; }
    .action-btn { width: 80px; height: 80px; border-radius: 24px; border: none; font-size: 32px; color: white; cursor: pointer; margin-bottom: 16px; font-weight: 700; }
    .btn-c { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
    .btn-j { background: linear-gradient(135deg, #2dd4bf, #0d9488); }
    
    /* Исправление переполнения кнопок */
    .segmented-control { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; width: 100%; }
    .seg-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #d1d1d6; padding: 6px 10px; cursor: pointer; font-size: 12px; border-radius: 6px; flex: 1 1 40%; }
    .seg-btn.active { border-color: #fff; color: #fff; background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

  <div class="bento-container">
    <div class="results-panel">
      <div class="stat-row"><span>Сумма</span><span id="total-clicks">0</span></div>
      <div class="stat-row"><span>Итог</span><span id="accumulated-output" style="font-weight:700">0.0</span></div>
    </div>

    <div class="btn-group">
      <button class="settings-btn" id="btn-tab-manual" onclick="toggleTab('manual')">Настройки</button>
      <button class="settings-btn" id="btn-tab-cloud" onclick="toggleTab('cloud')">Облако</button>
    </div>

    <div id="panel-manual" class="settings-panel">
      <div class="stat-row">Счетчик C <input type="number" id="input-c" class="modern-input" onchange="applyManual()"></div>
      <div class="stat-row">Счетчик J <input type="number" id="input-j" class="modern-input" onchange="applyManual()"></div>
    </div>

    <div id="panel-cloud" class="settings-panel">
      <div class="stat-row">ID sync <input type="text" id="input-sync-id" class="modern-input" placeholder="ID..."></div>
      <button class="cloud-btn" onclick="initSync()">Загрузить данные</button>
      <div id="cloud-status" style="margin-top:15px; font-size:12px; text-align:center; color:#a1a1aa">Автосохранение выключено</div>
    </div>

    <div class="counters-grid">
      <div class="counter-card">
        <button id="btn-c" class="action-btn btn-c">C</button>
        <div id="coeffs-c" class="segmented-control">
            <button class="seg-btn" onclick="setCoeff('C', 0.2, this)">0.2</button>
            <button class="seg-btn" onclick="setCoeff('C', 0.3, this)">0.3</button>
            <button class="seg-btn" onclick="setCoeff('C', 0.4, this)">0.4</button>
            <button class="seg-btn" onclick="setCoeff('C', 0.6, this)">0.6</button>
        </div>
      </div>
      <div class="counter-card">
        <button id="btn-j" class="action-btn btn-j">J</button>
        <div id="coeffs-j" class="segmented-control">
            <button class="seg-btn" onclick="setCoeff('J', 0.2, this)">0.2</button>
            <button class="seg-btn" onclick="setCoeff('J', 0.3, this)">0.3</button>
            <button class="seg-btn" onclick="setCoeff('J', 0.4, this)">0.4</button>
            <button class="seg-btn" onclick="setCoeff('J', 0.6, this)">0.6</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let state = { countC: 0, countJ: 0, coeffC: 0.4, coeffJ: 0.4, historyC: [], historyJ: [], syncId: "" };
    let isSyncInitialized = false; // Логика: автосохранение активно только после нажатия кнопки
    const apiBase = "https://api.npoint.io/";

    function loadData() {
      const saved = localStorage.getItem('classic_sync_v12');
      if (saved) {
        state = JSON.parse(saved);
        updateCoeffVisuals('C', state.coeffC);
        updateCoeffVisuals('J', state.coeffJ);
      }
      document.getElementById('input-sync-id').value = state.syncId;
      updateUI();
    }

    // Сохранение вызывается при каждом клике, но отправляет в облако только если initSync прошел
    function saveData() {
      state.syncId = document.getElementById('input-sync-id').value.trim();
      localStorage.setItem('classic_sync_v12', JSON.stringify(state));
      
      if (isSyncInitialized) {
        autoPushToCloud();
      }
    }

    async function autoPushToCloud() {
      const status = document.getElementById('cloud-status');
      status.textContent = "Сохранение...";
      try {
        const res = await fetch(apiBase + state.syncId, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(state) });
        status.textContent = res.ok ? "Автосохранено" : "Ошибка сервера";
      } catch(e) { status.textContent = "Ошибка сети"; }
    }

    // Инициализация синхронизации (кнопка "Загрузить")
    async function initSync() {
      const id = document.getElementById('input-sync-id').value.trim();
      if (!id) { alert("Введите ID"); return; }
      
      const status = document.getElementById('cloud-status');
      status.textContent = "Загрузка...";
      
      try {
        const res = await fetch(apiBase + id);
        if (res.ok) {
          state = await res.json();
          isSyncInitialized = true; // Активируем автосохранение
          localStorage.setItem('classic_sync_v12', JSON.stringify(state));
          updateCoeffVisuals('C', state.coeffC);
          updateCoeffVisuals('J', state.coeffJ);
          updateUI();
          status.textContent = "Синхронизация включена";
        } else {
          alert("ID не найден");
          status.textContent = "Ошибка загрузки";
        }
      } catch(e) { status.textContent = "Ошибка сети"; }
    }

    function updateUI() {
      document.getElementById('total-clicks').textContent = state.countC + state.countJ;
      let total = state.historyC.reduce((a,b)=>a+b,0) + state.historyJ.reduce((a,b)=>a+b,0);
      document.getElementById('accumulated-output').textContent = total.toFixed(1);
      document.getElementById('input-c').value = state.countC;
      document.getElementById('input-j').value = state.countJ;
    }

    function updateCoeffVisuals(type, val) {
      const containerId = type === 'C' ? 'coeffs-c' : 'coeffs-j';
      document.querySelectorAll(`#${containerId} .seg-btn`).forEach(btn => {
        if (parseFloat(btn.textContent) === val) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }

    document.getElementById('btn-c').onclick = () => { state.countC++; state.historyC.push(state.coeffC); updateUI(); saveData(); };
    document.getElementById('btn-j').onclick = () => { state.countJ++; state.historyJ.push(state.coeffJ); updateUI(); saveData(); };

    function setCoeff(type, val, btn) {
      if (type === 'C') state.coeffC = val; else state.coeffJ = val;
      updateCoeffVisuals(type, val);
      saveData();
    }

    function applyManual() {
      state.countC = parseInt(document.getElementById('input-c').value) || 0;
      state.countJ = parseInt(document.getElementById('input-j').value) || 0;
      updateUI();
      saveData();
    }

    function toggleTab(t) {
      const p1 = document.getElementById('panel-manual');
      const p2 = document.getElementById('panel-cloud');
      if (t === 'manual') { p1.style.display = p1.style.display === 'block' ? 'none' : 'block'; p2.style.display = 'none'; }
      else { p2.style.display = p2.style.display === 'block' ? 'none' : 'block'; p1.style.display = 'none'; }
    }

    window.onload = loadData;
  </script>
</body>
</html>
