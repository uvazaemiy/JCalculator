<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Classic Interface // Strict Dependence</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
    
    :root {
      --bg-dark: #2c2c35;
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      --radius-large: 32px;
      --radius-medium: 20px;
      --radius-small: 12px;
    }
    
    body { 
      margin: 0; 
      min-height: 100vh; 
      font-family: 'Outfit', sans-serif; 
      color: var(--text-main); 
      background: linear-gradient(135deg, #444453 0%, #25252d 100%);
      display: flex; 
      justify-content: center; 
      align-items: center; 
      padding: 20px; 
      box-sizing: border-box; 
    }
    
    .bento-container { 
      background: rgba(40, 40, 50, 0.5); 
      backdrop-filter: blur(40px); 
      border: 1px solid var(--glass-border); 
      border-radius: var(--radius-large); 
      padding: 32px; 
      width: 100%; 
      max-width: 480px; 
      box-shadow: 0 25px 55px rgba(0,0,0,0.25);
    }
    
    .results-panel { 
      background: var(--glass-bg); 
      border: 1px solid var(--glass-border); 
      border-radius: var(--radius-medium); 
      padding: 24px; 
      margin-bottom: 20px; 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
    }
    
    .stat-row { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    
    .stat-label { 
      color: var(--text-muted); 
      font-weight: 300; 
      font-size: 15px; 
    }
    
    .stat-value { 
      font-size: 20px; 
      font-weight: 500; 
    }
    
    .total-output { 
      font-size: 28px; 
      font-weight: 700; 
      color: #fff; 
    }
    
    .settings-btn { 
      width: 100%; 
      background: transparent; 
      border: 1px solid var(--glass-border); 
      color: var(--text-muted); 
      padding: 12px; 
      border-radius: var(--radius-small); 
      cursor: pointer; 
      margin-bottom: 20px; 
      font-family: inherit
