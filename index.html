<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Auto-Sync v11</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
    :root {
      --bg-dark: #2c2c35;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.25);
      --text-main: #ffffff;
      --text-muted: #d1d1d6;
    }
    body { margin: 0; min-height: 100vh; font-family: 'Outfit', sans-serif; color: var(--text-main); background: linear-gradient(135deg, #3d3d4d 0%, #1a1a20 100%); display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .bento-container { background: rgba(30, 30, 40, 0.7); backdrop-filter: blur(20px); border: 2px solid var(--glass-border); border-radius: 32px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .results-panel { background: rgba(0,0,0,0.2); border: 2px solid var(--glass-border); border-radius: 20px; padding: 24px; margin-bottom: 24px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.3); }
    .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 16px; }
    .btn-group { display: flex; gap: 12px; margin-bottom: 24px; }
    .settings-btn { flex: 1; background: rgba(255,255,255,0.05); border: 2px solid var(--glass-border); color: var(--text-muted); padding: 14px; border-radius: 16px; cursor: pointer; font-family: inherit; font-weight: 600; }
    .settings-btn.active { background: rgba(255, 255, 255, 0.15); border-color: #fff; color: #fff; }
    .settings-panel { display: none; background: rgba(0, 0, 0, 0.2); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 2px solid var(--glass-border); }
    .modern-input { background: rgba(0,0,0,0.3); border: 2px solid var(--glass-border); color: var(--text-main); padding: 10px; border-radius: 10px; width: 120px; text-align: center; font-size: 16px; }
    .counters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .counter-card { background: rgba(255,255,255,0.03); border: 2px solid var(--glass-border); border-radius: 24px; padding: 24px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    .action-btn { width: 90px; height: 90px; border-radius: 28px; border: 3px solid rgba(255,255,255,0.2); font-size: 36px; color: white; cursor: pointer; margin-bottom: 20px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    .btn-c { background: linear-gradient(135deg, #a78bfa, #6d28d9); }
    .btn-j { background: linear-gradient(135deg, #2dd4bf, #0f766e); }
    .segmented-control { display: flex; gap: 6px; width: 100%; justify-content: center; }
    .seg-btn { background: rgba(255,255,255,0.05); border: 2px solid var(--glass-border); color: var(--text-muted); padding: 10px 16px; cursor: pointer; font-size: 14px; border-radius: 12px; font-weight: 600; flex: 1; }
    .seg-btn.active { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

  <div class="bento-container">
    <div class="results-panel">
      <div class="stat-row"><span>Сумма</span><span id="total-clicks" style="font-weight:700">0</span></div>
      <div class="stat-row"><span>Итог</span><span id="accumulated-output" style="font-weight:700; color: #fff; font-size: 24px;">0.0</span></div>
    </div>

    <div class="btn-group">
      <button class="settings-btn" id="btn-tab-manual" onclick="toggleTab('manual')">Настройки</button>
      <button class="settings-btn" id="btn-tab-cloud" onclick="toggleTab('cloud')">Облако</button>
    </div>

    <div id="panel-manual" class="settings-panel">
      <div class="stat-row">Счетчик C <input type="number" id="input-c" class="modern-input" onchange="applyManual()"></div>
      <div class="stat-row">Счетчик J <input type="number" id="input-j" class="modern-input" onchange="applyManual()"></div>
    </div>

    <div id="panel-cloud" class="settings-panel">
      <div class="stat-row">ID sync <input type="text" id="input-sync-id" class="modern-input" oninput="saveData()" placeholder="введите ID"></div>
      <div id="cloud-status" style="margin-top:15px; font-size:14px; text-align:center; color:#a1a1aa">Автосохранение активно</div>
    </div>

    <div class="counters-grid">
      <div class="counter-card">
        <button id="btn-c" class="action-btn btn-c">C</button>
        <div id="coeffs-c" class="segmented-control">
            <button class="seg-btn" onclick="setCoeff('C', 0.2, this)">0.2</button>
            <button class="seg-btn" onclick="setCoeff('C', 0.3, this)">0.3</button>
            <button class="seg-btn" onclick="setCoeff('C', 0.4, this)">0.4</button>
            <button class="seg-btn" onclick="setCoeff('C', 0.6, this)">0.6</button>
        </div>
      </div>
      <div class="counter-card">
        <button id="btn-j" class="action-btn btn-j">J</button>
        <div id="coeffs-j" class="segmented-control">
            <button class="seg-btn" onclick="setCoeff('J', 0.2, this)">0.2</button>
            <button class="seg-btn" onclick="setCoeff('J', 0.3, this)">0.3</button>
            <button class="seg-btn" onclick="setCoeff('J', 0.4, this)">0.4</button>
            <button class="seg-btn" onclick="setCoeff('J', 0.6, this)">0.6</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let state = { countC: 0, countJ: 0, coeffC: 0.4, coeffJ: 0.4, historyC: [], historyJ: [], syncId: "" };
    const apiBase = "https://api.npoint.io/";
    let autoSaveTimeout;

    function loadData() {
      const saved = localStorage.getItem('classic_sync_v11');
      if (saved) {
        state = JSON.parse(saved);
        updateCoeffVisuals('C', state.coeffC);
        updateCoeffVisuals('J', state.coeffJ);
      }
      document.getElementById('input-sync-id').value = state.syncId;
      updateUI();
    }

    function saveData() {
      state.syncId = document.getElementById('input-sync-id').value.trim();
      localStorage.setItem('classic_sync_v11', JSON.stringify(state));
      const status = document.getElementById('cloud-status');
      if (!state.syncId) { status.textContent = "Введите ID для автосохранения"; return; }
      clearTimeout(autoSaveTimeout);
      status.textContent = "Сохранение...";
      autoSaveTimeout = setTimeout(async () => {
        try {
          const res = await fetch(apiBase + state.syncId, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(state) });
          status.textContent = res.ok ? "Автосохранено" : "Ошибка сервера";
        } catch(e) { status.textContent = "Ошибка сети"; }
      }, 500);
    }

    function updateUI() {
      document.getElementById('total-clicks').textContent = state.countC + state.countJ;
      let total = state.historyC.reduce((a,b)=>a+b,0) + state.historyJ.reduce((a,b)=>a+b,0);
      document.getElementById('accumulated-output').textContent = total.toFixed(1);
      document.getElementById('input-c').value = state.countC;
      document.getElementById('input-j').value = state.countJ;
    }

    function updateCoeffVisuals(type, val) {
      const containerId = type === 'C' ? 'coeffs-c' : 'coeffs-j';
      document.querySelectorAll(`#${containerId} .seg-btn`).forEach(btn => {
        if (parseFloat(btn.textContent) === val) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }

    document.getElementById('btn-c').onclick = () => { state.countC++; state.historyC.push(state.coeffC); updateUI(); saveData(); };
    document.getElementById('btn-j').onclick = () => { state.countJ++; state.historyJ.push(state.coeffJ); updateUI(); saveData(); };

    function setCoeff(type, val, btn) {
      if (type === 'C') state.coeffC = val; else state.coeffJ = val;
      updateCoeffVisuals(type, val);
      saveData();
    }

    function applyManual() {
      state.countC = parseInt(document.getElementById('input-c').value) || 0;
      state.countJ = parseInt(document.getElementById('input-j').value) || 0;
      saveData();
      updateUI();
    }

    function toggleTab(t) {
      const p1 = document.getElementById('panel-manual');
      const p2 = document.getElementById('panel-cloud');
      if (t === 'manual') { p1.style.display = p1.style.display === 'block' ? 'none' : 'block'; p2.style.display = 'none'; }
      else { p2.style.display = p2.style.display === 'block' ? 'none' : 'block'; p1.style.display = 'none'; }
    }

    window.onload = loadData;
  </script>
</body>
</html>
