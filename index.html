<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Sync Pro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
    :root { --bg-dark: #1a1a20; }
    body { margin: 0; min-height: 100vh; font-family: 'Outfit', sans-serif; color: #fff; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    
    .bento-container {
      position: relative;
      background: #1e1e28;
      border-radius: 32px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      border: 3px solid transparent;
      background-clip: padding-box;
    }
    /* Анимация контура */
    .bento-container::before {
      content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px;
      border-radius: 35px;
      background: linear-gradient(45deg, #ff00cc, #3333ff, #00ffcc, #ff00cc);
      background-size: 400%; z-index: -1;
      animation: border-rotate 8s linear infinite;
    }
    @keyframes border-rotate { 0% { background-position: 0 0; } 100% { background-position: 400% 0; } }

    .results-panel { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
    .settings-btn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #d1d1d6; padding: 12px; border-radius: 12px; cursor: pointer; }
    .settings-btn.active { background: rgba(255,255,255,0.15); border-color: #fff; color: #fff; }
    .settings-panel { display: none; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
    .modern-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-top: 5px;}
    .cloud-btn { width: 100%; background: #4f46e5; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: 600; }
    
    .counters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .counter-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; display: flex; flex-direction: column; align-items: center; }
    .action-btn { width: 70px; height: 70px; border-radius: 20px; border: none; font-size: 28px; color: white; cursor: pointer; margin-bottom: 15px; font-weight: 700; }
    .btn-c { background: linear-gradient(135deg, #a78bfa, #6d28d9); }
    .btn-j { background: linear-gradient(135deg, #2dd4bf, #0f766e); }
    
    .segmented-control { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; width: 100%; }
    .seg-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #d1d1d6; padding: 6px; cursor: pointer; font-size: 11px; border-radius: 6px; flex: 1 1 40%; }
    .seg-btn.active { border-color: #fff; color: #fff; background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <div class="bento-container">
    <div class="results-panel">
      <div class="stat-row"><span>Сумма</span><span id="total-clicks">0</span></div>
      <div class="stat-row"><span>Итог</span><span id="accumulated-output" style="font-weight:700; font-size: 20px;">0.0</span></div>
    </div>

    <div class="btn-group">
      <button class="settings-btn" onclick="toggleTab('manual')">Настройки</button>
      <button class="settings-btn" onclick="toggleTab('cloud')">Облако</button>
    </div>

    <div id="panel-manual" class="settings-panel">
      <div class="stat-row">Счетчик C <input type="number" id="input-c" class="modern-input" onchange="applyManual()"></div>
      <div class="stat-row">Счетчик J <input type="number" id="input-j" class="modern-input" onchange="applyManual()"></div>
    </div>

    <div id="panel-cloud" class="settings-panel">
      <div style="font-size: 12px; margin-bottom: 5px;">ID синхронизации</div>
      <input type="text" id="input-sync-id" class="modern-input" placeholder="Введите ID...">
      <button class="cloud-btn" style="background:#059669" onclick="loadFromCloud()">1. Загрузить данные</button>
      <button class="cloud-btn" onclick="saveToCloud()">2. Сохранить в облако</button>
      <div id="cloud-status" style="margin-top:15px; font-size:12px; text-align:center; color:#a1a1aa">Статус: Ожидание...</div>
    </div>

    <div class="counters-grid">
      <div class="counter-card">
        <button id="btn-c" class="action-btn btn-c" onclick="addClick('C')">C</button>
        <div id="coeffs-c" class="segmented-control">
            <button class="seg-btn" onclick="setCoeff('C', 0.2, this)">0.2</button>
            <button class="seg-btn" onclick="setCoeff('C', 0.3, this)">0.3</button>
            <button class="seg-btn" onclick="setCoeff('C', 0.4, this)">0.4</button>
            <button class="seg-btn" onclick="setCoeff('C', 0.6, this)">0.6</button>
        </div>
      </div>
      <div class="counter-card">
        <button id="btn-j" class="action-btn btn-j" onclick="addClick('J')">J</button>
        <div id="coeffs-j" class="segmented-control">
            <button class="seg-btn" onclick="setCoeff('J', 0.2, this)">0.2</button>
            <button class="seg-btn" onclick="setCoeff('J', 0.3, this)">0.3</button>
            <button class="seg-btn" onclick="setCoeff('J', 0.4, this)">0.4</button>
            <button class="seg-btn" onclick="setCoeff('J', 0.6, this)">0.6</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let state = { countC: 0, countJ: 0, coeffC: 0.4, coeffJ: 0.4, historyC: [], historyJ: [], syncId: "" };
    let isCloudSynced = false; 
    const apiBase = "https://api.npoint.io/";

    function saveLocal() {
      state.syncId = document.getElementById('input-sync-id').value.trim();
      localStorage.setItem('classic_sync_v13', JSON.stringify(state));
    }

    // Загрузка
    async function loadFromCloud() {
      const id = document.getElementById('input-sync-id').value.trim();
      if (!id) { alert("Введите ID"); return; }
      
      const status = document.getElementById('cloud-status');
      status.textContent = "Загрузка...";
      
      try {
        const res = await fetch(apiBase + id);
        if (res.ok) {
          const remoteData = await res.json();
          // Проверка на корректность данных
          if (remoteData && typeof remoteData === 'object') {
             state = remoteData;
             isCloudSynced = true; // РАЗБЛОКИРОВКА
             saveLocal();
             updateUI();
             updateCoeffVisuals('C', state.coeffC);
             updateCoeffVisuals('J', state.coeffJ);
             status.textContent = "Успешно загружено и синхронизировано";
          }
        } else { status.textContent = "Ошибка загрузки (ID не найден)"; }
      } catch(e) { status.textContent = "Ошибка сети"; }
    }

    // Ручное сохранение
    async function saveToCloud() {
      if (!isCloudSynced) { alert("Сначала загрузите данные, чтобы убедиться в правильности ID!"); return; }
      const status = document.getElementById('cloud-status');
      status.textContent = "Сохранение...";
      try {
        const res = await fetch(apiBase + state.syncId, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(state) });
        status.textContent = res.ok ? "Сохранено в облако" : "Ошибка сервера";
      } catch(e) { status.textContent = "Ошибка сети"; }
    }

    // Авто-сохранение (только если уже синхронизировано)
    function autoSave() {
      saveLocal();
      if (isCloudSynced) {
         // Делаем фоновое сохранение без смены статуса (чтобы не отвлекать)
         fetch(apiBase + state.syncId, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(state) }).catch(e => console.log("Auto-save failed"));
      }
    }

    function addClick(type) {
      if (type === 'C') { state.countC++; state.historyC.push(state.coeffC); }
      else { state.countJ++; state.historyJ.push(state.coeffJ); }
      updateUI();
      autoSave();
    }

    function updateUI() {
      document.getElementById('total-clicks').textContent = state.countC + state.countJ;
      let total = state.historyC.reduce((a,b)=>a+b,0) + state.historyJ.reduce((a,b)=>a+b,0);
      document.getElementById('accumulated-output').textContent = total.toFixed(1);
      document.getElementById('input-c').value = state.countC;
      document.getElementById('input-j').value = state.countJ;
    }

    function updateCoeffVisuals(type, val) {
      const containerId = type === 'C' ? 'coeffs-c' : 'coeffs-j';
      document.querySelectorAll(`#${containerId} .seg-btn`).forEach(btn => {
        if (parseFloat(btn.textContent) === val) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }

    function setCoeff(type, val, btn) {
      if (type === 'C') state.coeffC = val; else state.coeffJ = val;
      updateCoeffVisuals(type, val);
      autoSave();
    }

    function applyManual() {
      state.countC = parseInt(document.getElementById('input-c').value) || 0;
      state.countJ = parseInt(document.getElementById('input-j').value) || 0;
      updateUI();
      autoSave();
    }

    function toggleTab(t) {
      const p1 = document.getElementById('panel-manual');
      const p2 = document.getElementById('panel-cloud');
      if (t === 'manual') { p1.style.display = p1.style.display === 'block' ? 'none' : 'block'; p2.style.display = 'none'; }
      else { p2.style.display = p2.style.display === 'block' ? 'none' : 'block'; p1.style.display = 'none'; }
    }

    window.onload = () => {
      const saved = localStorage.getItem('classic_sync_v13');
      if (saved) {
        state = JSON.parse(saved);
        document.getElementById('input-sync-id').value = state.syncId;
        updateUI();
        updateCoeffVisuals('C', state.coeffC);
        updateCoeffVisuals('J', state.coeffJ);
      }
    };
  </script>
</body>
</html>
