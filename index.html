<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Auto-Sync</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
    :root {
      --bg-dark: #2c2c35;
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
    }
    body { margin: 0; min-height: 100vh; font-family: 'Outfit', sans-serif; color: var(--text-main); background: linear-gradient(135deg, #444453 0%, #25252d 100%); display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .bento-container { background: rgba(40, 40, 50, 0.5); backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-radius: 32px; padding: 32px; width: 100%; max-width: 480px; }
    .results-panel { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
    .settings-btn { flex: 1; background: transparent; border: 1px solid var(--glass-border); color: var(--text-muted); padding: 12px; border-radius: 12px; cursor: pointer; font-family: inherit; }
    .settings-btn.active { background: rgba(255, 255, 255, 0.1); color: var(--text-main); }
    .settings-panel { display: none; background: rgba(0, 0, 0, 0.15); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--glass-border); }
    .modern-input { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: var(--text-main); padding: 8px 12px; border-radius: 8px; width: 100px; }
    .cloud-btn { width: 100%; background: #6366f1; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 500; }
    .counters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .counter-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .action-btn { width: 80px; height: 80px; border-radius: 24px; border: none; font-size: 32px; color: white; cursor: pointer; margin-bottom: 16px; }
    .btn-c { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
    .btn-j { background: linear-gradient(135deg, #2dd4bf, #0d9488); }
    .seg-btn { background: transparent; border: none; color: var(--text-muted); padding: 6px; cursor: pointer; font-size: 12px; }
    .seg-btn.active { color: #fff; text-decoration: underline; }
  </style>
</head>
<body>

  <div class="bento-container">
    <div class="results-panel">
      <div class="stat-row"><span>Сумма</span><span id="total-clicks">0</span></div>
      <div class="stat-row"><span>Итог</span><span id="accumulated-output" style="font-weight:700">0.0</span></div>
    </div>

    <div class="btn-group">
      <button class="settings-btn" id="btn-tab-manual" onclick="toggleTab('manual')">Настройки</button>
      <button class="settings-btn" id="btn-tab-cloud" onclick="toggleTab('cloud')">Облако</button>
    </div>

    <div id="panel-manual" class="settings-panel">
      <div class="stat-row">Счетчик C <input type="number" id="input-c" class="modern-input" onchange="applyManual()"></div>
      <div class="stat-row">Счетчик J <input type="number" id="input-j" class="modern-input" onchange="applyManual()"></div>
    </div>

    <div id="panel-cloud" class="settings-panel">
      <div class="stat-row">ID для sync <input type="text" id="input-sync-id" class="modern-input" oninput="saveData()" placeholder="введите ID"></div>
      <button class="cloud-btn" onclick="cloudPull()">Загрузить из облака</button>
      <div id="cloud-status" style="margin-top:10px; font-size:12px; text-align:center; color:#a1a1aa">Ожидание...</div>
    </div>

    <div class="counters-grid">
      <div class="counter-card">
        <button id="btn-c" class="action-btn btn-c">C</button>
        <div id="coeffs-c" class="segmented-control"><button class="seg-btn" onclick="setCoeff('C', 0.2, this)">0.2</button><button class="seg-btn" onclick="setCoeff('C', 0.4, this)">0.4</button><button class="seg-btn" onclick="setCoeff('C', 0.6, this)">0.6</button></div>
      </div>
      <div class="counter-card">
        <button id="btn-j" class="action-btn btn-j">J</button>
        <div id="coeffs-j" class="segmented-control"><button class="seg-btn" onclick="setCoeff('J', 0.2, this)">0.2</button><button class="seg-btn" onclick="setCoeff('J', 0.4, this)">0.4</button><button class="seg-btn" onclick="setCoeff('J', 0.6, this)">0.6</button></div>
      </div>
    </div>
  </div>

  <script>
    let state = { countC: 0, countJ: 0, coeffC: 0.4, coeffJ: 0.4, historyC: [], historyJ: [], syncId: "" };
    const apiBase = "https://api.npoint.io/";
    let autoSaveTimeout;

    function loadData() {
      const saved = localStorage.getItem('classic_sync');
      if (saved) state = JSON.parse(saved);
      document.getElementById('input-sync-id').value = state.syncId;
      updateUI();
    }

    function saveData() {
      state.syncId = document.getElementById('input-sync-id').value.trim();
      localStorage.setItem('classic_sync', JSON.stringify(state));
      
      const status = document.getElementById('cloud-status');
      if (!state.syncId) { status.textContent = "Введите ID для автосохранения"; return; }

      clearTimeout(autoSaveTimeout);
      status.textContent = "Сохранение...";
      
      autoSaveTimeout = setTimeout(async () => {
        try {
          const res = await fetch(apiBase + state.syncId, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(state) });
          status.textContent = res.ok ? "Автосохранено" : "Ошибка сервера";
        } catch(e) { status.textContent = "Ошибка сети"; }
      }, 500);
    }

    function updateUI() {
      document.getElementById('total-clicks').textContent = state.countC + state.countJ;
      let total = state.historyC.reduce((a,b)=>a+b,0) + state.historyJ.reduce((a,b)=>a+b,0);
      document.getElementById('accumulated-output').textContent = total.toFixed(1);
      document.getElementById('input-c').value = state.countC;
      document.getElementById('input-j').value = state.countJ;
    }

    document.getElementById('btn-c').onclick = () => { state.countC++; state.historyC.push(state.coeffC); updateUI(); saveData(); };
    document.getElementById('btn-j').onclick = () => { state.countJ++; state.historyJ.push(state.coeffJ); updateUI(); saveData(); };

    function setCoeff(type, val, btn) {
      if (type === 'C') state.coeffC = val; else state.coeffJ = val;
      saveData();
      btn.parentElement.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function applyManual() {
      state.countC = parseInt(document.getElementById('input-c').value) || 0;
      state.countJ = parseInt(document.getElementById('input-j').value) || 0;
      saveData();
      updateUI();
    }

    async function cloudPull() {
      const id = document.getElementById('input-sync-id').value.trim();
      if (!id) return;
      const res = await fetch(apiBase + id);
      if (res.ok) { state = await res.json(); saveData(); updateUI(); alert("Загружено!"); }
    }

    function toggleTab(t) {
      const p1 = document.getElementById('panel-manual');
      const p2 = document.getElementById('panel-cloud');
      if (t === 'manual') { p1.style.display = p1.style.display === 'block' ? 'none' : 'block'; p2.style.display = 'none'; }
      else { p2.style.display = p2.style.display === 'block' ? 'none' : 'block'; p1.style.display = 'none'; }
    }

    window.onload = loadData;
  </script>
</body>
</html>
